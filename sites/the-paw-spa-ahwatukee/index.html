  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <div id="root"></div>

    <script>
      (() => {
        const socials = [
          { name: 'Instagram', url: 'https://www.instagram.com/arizonapawspa/', label: 'Follow The Paw Spa on Instagram', icon: '<svg aria-hidden="true" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5"></rect><circle cx="12" cy="12" r="4"></circle><circle cx="17" cy="7" r="1.2" fill="currentColor" stroke="none"></circle></svg>' },
          { name: 'Facebook', url: 'https://www.facebook.com/petstylistaz/', label: 'Follow The Paw Spa on Facebook', icon: '<svg aria-hidden="true" viewBox="0 0 24 24"><path d="M14 8h3V4h-3c-3 0-5 2-5 5v3H6v4h3v4h4v-4h3l1-4h-4V9c0-.6.4-1 1-1z" fill="currentColor" stroke="none"></path></svg>' }
        ];
        const makeLink = (item, className) => {
          const a = document.createElement('a');
          a.className = className;
          a.href = item.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.setAttribute('aria-label', item.label);
          a.innerHTML = `${item.icon}<span>${item.name}</span>`;
          return a;
        };
        const install = () => {
          const actions = document.querySelector('.contact-actions');
          if (actions && !actions.querySelector('.social-actions')) {
            const wrap = document.createElement('div');
            wrap.className = 'social-actions';
            wrap.setAttribute('aria-label', 'Follow The Paw Spa on social media');
            socials.forEach((item) => wrap.appendChild(makeLink(item, 'social-icon')));
            actions.appendChild(wrap);
          }
          const footerCols = document.querySelectorAll('.footer-grid > div');
          const plan = footerCols[3];
          if (plan && !plan.querySelector('.footer-social-link')) {
            socials.forEach((item) => plan.insertBefore(makeLink(item, 'footer-social-link'), plan.lastElementChild));
          }
          const ld = document.querySelector('script[type="application/ld+json"]');
          if (ld && !ld.textContent.includes('arizonapawspa')) {
            try {
              const data = JSON.parse(ld.textContent);
              data.sameAs = socials.map((item) => item.url);
              ld.textContent = JSON.stringify(data);
            } catch {}
          }
          return Boolean(actions && plan);
        };
        let tries = 0;
        const timer = setInterval(() => {
          tries += 1;
          if (install() || tries > 40) clearInterval(timer);
        }, 100);
        window.addEventListener('load', install);
      })();
    </script>
  </body>
